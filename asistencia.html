<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Registro de asistencia para Ministerio CRECE PRFWB.">
  <title>Registro de Asistencia | Ministerio CRECE</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="app-body">
  <main class="page-shell">
    <section class="container narrow-container">
      <a href="index.html" class="back-link"><i class="bi bi-arrow-left"></i> Volver al inicio</a>

      <div class="app-card attendance-card">
        <img src="assets/logo.png" alt="PRFWB" class="card-logo">
        <div class="card-icon"><i class="bi bi-person-check"></i></div>
        <p class="section-kicker">Ministerio CRECE PRFWB</p>
        <h1>Registro de asistencia</h1>
        <div class="attendance-date" id="currentAttendanceDate">
          <i class="bi bi-calendar-event"></i>
          <span>Cargando fecha...</span>
        </div>
        <p class="muted-text">Escanea el QR del estudiante o escribe su numero para registrar la asistencia.</p>

        <form id="attendanceForm" class="mt-4">
          <div class="mb-3">
            <label for="studentCode" class="form-label">Numero del estudiante</label>
            <div class="input-group input-group-lg">
              <span class="input-group-text"><i class="bi bi-upc-scan"></i></span>
              <input id="studentCode" name="studentCode" type="text" class="form-control" placeholder="Ejemplo: PRF-123456" required>
            </div>
          </div>

          <div id="scannerPanel" class="scanner-panel d-none mb-3">
            <div id="qrReader"></div>
          </div>

          <div id="studentPreview" class="student-preview d-none mb-3"></div>

          <div class="name-search-box mb-3">
            <label for="studentNameSearch" class="form-label">Buscar por nombre</label>
            <div class="input-group input-group-lg">
              <span class="input-group-text"><i class="bi bi-search"></i></span>
              <input id="studentNameSearch" type="search" class="form-control" placeholder="Si no tiene QR o numero">
            </div>
            <div id="nameSearchResults" class="name-search-results d-none"></div>
          </div>

          <button id="scanQrButton" class="btn btn-outline-primary btn-lg w-100 mb-3" type="button">
            <i class="bi bi-camera"></i>
            ESCANEAR QR
          </button>

          <button class="btn btn-primary btn-lg w-100 submit-button" type="submit">
            <i class="bi bi-check2-circle"></i>
            REGISTRAR ASISTENCIA
          </button>
        </form>
      </div>
    </section>
  </main>

  <div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="appToast" class="toast align-items-center text-bg-primary border-0" role="status" aria-live="polite" aria-atomic="true">
      <div class="d-flex">
        <div class="toast-body">Asistencia registrada correctamente.</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Cerrar"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
